<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Resizer</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<main>
  <h1>Image resizer</h1>
  <p class="subtitle">Resize an image right in your browser. Nothing is uploaded anywhere.</p>

  <div class="dropzone" id="dropzone">
    <p>Drop an image here, or click to choose one</p>
    <p class="hint">JPG, PNG, or WebP</p>
    <input type="file" id="fileInput" accept="image/png, image/jpeg, image/webp">
  </div>

  <div class="panel" id="panel">
    <div class="readout">
      <span class="file-name" id="fileName">—</span>
      <span id="originalDims">— × —</span>
    </div>

    <div class="controls">
      <div class="field">
        <label for="widthInput">Width (px)</label>
        <input type="number" id="widthInput" min="1">
      </div>
      <button class="lock-btn active" id="lockBtn" title="Lock aspect ratio">🔒</button>
      <div class="field">
        <label for="heightInput">Height (px)</label>
        <input type="number" id="heightInput" min="1">
      </div>
    </div>

    <div class="controls">
      <div class="field">
        <label for="formatSelect">Output format</label>
        <select id="formatSelect">
          <option value="image/jpeg">JPG</option>
          <option value="image/png">PNG</option>
          <option value="image/webp">WebP</option>
        </select>
      </div>
    </div>

    <div class="quality-row" id="qualityRow">
      <label for="qualityInput">Quality — <span id="qualityValue">85</span>%</label>
      <input type="range" id="qualityInput" min="1" max="100" value="85">
    </div>

    <div class="preview">
      <img id="previewImg" alt="Resized preview">
      <div class="out-info" id="outInfo">—</div>
    </div>

    <div class="actions">
      <button class="reset" id="resetBtn">Start over</button>
      <button class="download" id="downloadBtn">Download</button>
    </div>
  </div>

  <p class="privacy-note">Your image is processed locally in this browser tab and never leaves your device.</p>
</main>

<canvas id="workCanvas" style="display:none;"></canvas>

<script src="script.js"></script>
</body>
</html>
